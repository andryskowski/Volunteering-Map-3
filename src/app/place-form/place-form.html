<div class="page-container placeform-page">
  <h1 class="page-header">Place Form</h1>

  <form class="form" [formGroup]="placeForm" (ngSubmit)="handleSubmit()">

    <label>
      Place Name
      <input formControlName="name" />
      <span class="error" *ngIf="f['name'].touched && f['name'].errors">
        <span *ngIf="f['name'].errors?.['required']">Name is required</span>
        <span *ngIf="f['name'].errors?.['minlength']">Minimum 3 characters</span>
      </span>
    </label>

    <label>
      Web Page
      <input formControlName="webPage" />
      <span class="error" *ngIf="f['webPage'].touched && f['webPage'].errors">
        Invalid URL
      </span>
    </label>

    <label>
      Email
      <input formControlName="email" />
      <span class="error" *ngIf="f['email'].touched && f['email'].errors">
        Invalid email
      </span>
    </label>

    <label>
      Phone
      <input formControlName="phone" />
      <span class="error" *ngIf="f['phone'].touched && f['phone'].errors">
        Invalid phone number
      </span>
    </label>

    <label>
      City
      <input formControlName="city" />
      <span class="error" *ngIf="f['city'].touched && f['city'].errors">
        City is required
      </span>
    </label>

    <label>
      Street
      <input formControlName="street" />
      <span class="error" *ngIf="f['street'].touched && f['street'].errors">
        Street is required
      </span>
    </label>

    <label>
      House No
      <input formControlName="houseNo" />
      <span class="error" *ngIf="f['houseNo'].touched && f['houseNo'].errors">
        House number is required
      </span>
    </label>

    <label>
      Postal Code
      <input formControlName="postalCode" />
      <span class="error" *ngIf="f['postalCode'].touched && f['postalCode'].errors">
        Format: 00-000
      </span>
    </label>

    <label>
      District
      <select formControlName="district">
        <option value="Bałuty">Bałuty</option>
        <option value="Śródmieście">Śródmieście</option>
        <option value="Widzew">Widzew</option>
        <option value="Polesie">Polesie</option>
        <option value="Górna">Górna</option>
        <option value="inna">Other</option>
      </select>
    </label>

    <label>
      Logo
      <input formControlName="img" />
    </label>

    <label>
      Category
      <select formControlName="category">
        <option value="children">Children</option>
        <option value="animals">Animals</option>
        <option value="invalids">Invalids</option>
        <option value="addictions">Addictions</option>
        <option value="retirees">Retirees</option>
        <option value="inne">Other</option>
      </select>
    </label>

    <label>
      Short Description
      <input formControlName="shortDescription" />
      <span class="error" *ngIf="f['shortDescription'].touched && f['shortDescription'].errors">
        Max 200 characters
      </span>
    </label>

    <label>Description</label>

    <button type="submit" [disabled]="placeForm.invalid">
      Send
    </button>
  </form>
</div>

<div class="modal-overlay" *ngIf="showConfirmationModal" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h2>Place Added Successfully!</h2>

    <div class="modal-place-info">
      <p><b>Name:</b> {{ infoAboutCurrentPlace.name }}</p>
      <p>
        <b>Address:</b>
        {{ infoAboutCurrentPlace.city }},
        {{ infoAboutCurrentPlace.street }},
        {{ infoAboutCurrentPlace.houseNo }},
        {{ infoAboutCurrentPlace.postalCode }}
      </p>
    </div>

    <button (click)="addPlace()">Add Place</button>
    <button (click)="closeModal()">Close</button>
  </div>
</div>
